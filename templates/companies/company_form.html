{% extends 'base.html' %}
{% load static %}
{% block content %}
<h1>{% if company %}تعديل شركة{% else %}إنشاء شركة{% endif %}</h1>
<form method="post" class="rtl" dir="rtl">
  {% csrf_token %}
  <div class="row g-3">
    {{ form.non_field_errors }}
    {% for field in form %}
      <div class="col-md-6">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <div class="text-danger small">{{ field.errors.0 }}</div>
        {% endif %}
      </div>
    {% endfor %}
  </div>
  <div class="mt-3">
    <a class="btn btn-secondary" href="{% if company %}{% url 'companies:detail' company.pk %}{% else %}{% url 'companies:list' %}{% endif %}">إلغاء</a>
    <button class="btn btn-primary" type="submit">حفظ</button>
  </div>
</form>
{% endblock %}
