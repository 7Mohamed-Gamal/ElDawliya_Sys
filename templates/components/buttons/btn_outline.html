{% comment %}
  Outline Button Component
  Usage: {% include 'components/buttons/btn_outline.html' with text="تفاصيل" href="#" color="primary" %}
  
  Color options: primary, secondary, success, error, warning
{% endcomment %}

{% if href %}
<a href="{{ href }}" 
   class="btn btn-outline-{{ color|default:'primary' }} {% if size == 'sm' %}btn-sm{% elif size == 'lg' %}btn-lg{% elif size == 'xl' %}btn-xl{% endif %} {{ extra_class|default:'' }}"
   {% if disabled %}aria-disabled="true" tabindex="-1"{% endif %}>
    {% if icon %}<i class="{{ icon }}"></i>{% endif %}
    {{ text }}
</a>
{% else %}
<button type="{{ type|default:'button' }}" 
        class="btn btn-outline-{{ color|default:'primary' }} {% if size == 'sm' %}btn-sm{% elif size == 'lg' %}btn-lg{% elif size == 'xl' %}btn-xl{% endif %} {{ extra_class|default:'' }}"
        {% if disabled %}disabled{% endif %}>
    {% if icon %}<i class="{{ icon }}"></i>{% endif %}
    {{ text }}
</button>
{% endif %}
