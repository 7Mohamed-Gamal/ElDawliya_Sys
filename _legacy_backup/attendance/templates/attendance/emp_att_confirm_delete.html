{% extends 'base.html' %}
{% block content %}
<h1>تأكيد حذف سجل الحضور</h1>
<p>سيتم حذف سجل حضور للموظف {{ item.emp.emp_code }} بتاريخ {{ item.att_date }}</p>
<form method="post">{% csrf_token %}
  <button class="btn btn-danger">تأكيد الحذف</button>
  <a class="btn btn-secondary" href="{% url 'attendance:emp_att_list' %}">إلغاء</a>
</form>
{% endblock %}
