[pytest]
# Django settings module
DJANGO_SETTINGS_MODULE = ElDawliya_sys.settings

# Python files to search for tests
python_files = test_*.py *_test.py tests.py

# Python classes to search for tests
python_classes = Test* *Tests

# Python functions to search for tests
python_functions = test_*

# Directories to search for tests
testpaths = .

# Directories to ignore
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    venv
    env
    .venv
    staticfiles
    media
    node_modules
    migrations

# Additional options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-config=.coveragerc
    --reuse-db
    --nomigrations
    --maxfail=5

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    api: marks tests as API tests
    ui: marks tests as UI tests
    security: marks tests as security tests
    performance: marks tests as performance tests

# Django configuration
django_find_project = false

# Coverage minimum percentage
# Uncomment when you want to enforce minimum coverage
# --cov-fail-under=70

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

