{% load static %}

<div class="action-buttons">
    {% if back_url %}
    <a href="{{ back_url }}" class="btn btn-sm btn-light">
        <i class="fas fa-arrow-right me-1"></i> الرجوع
    </a>
    {% endif %}

    {% if is_admin %}
        {% if edit_url %}
        <a href="{{ edit_url }}" class="btn btn-sm btn-primary">
            <i class="fas fa-edit me-1"></i> تعديل
        </a>
        {% endif %}

        {% if delete_url %}
        <a href="{{ delete_url }}" class="btn btn-sm btn-danger">
            <i class="fas fa-trash me-1"></i> حذف
        </a>
        {% endif %}

        {% if print_url %}
        <a href="{{ print_url }}" class="btn btn-sm btn-info">
            <i class="fas fa-print me-1"></i> طباعة
        </a>
        {% endif %}
    {% endif %}
</div>
