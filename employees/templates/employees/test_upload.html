{% extends 'base.html' %}
{% load static %}

{% block title %}Test Document Upload{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5>Test Document Upload for Employee {{ employee.emp_id }}</h5>
                </div>
                <div class="card-body">
                    <form id="testUploadForm" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="doc_type" class="form-label">Document Type</label>
                            <select class="form-select" id="doc_type" name="doc_type" required>
                                <option value="">Choose document type</option>
                                <option value="identity">ID Card</option>
                                <option value="passport">Passport</option>
                                <option value="contract">Contract</option>
                                <option value="certificate">Certificate</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="doc_name" class="form-label">Document Name</label>
                            <input type="text" class="form-control" id="doc_name" name="doc_name" placeholder="Document name (optional)">
                        </div>
                        
                        <div class="mb-3">
                            <label for="file_upload" class="form-label">File</label>
                            <input type="file" class="form-control" id="file_upload" name="file_upload" 
                                   accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.gif" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Notes (optional)"></textarea>
                        </div>
                        
                        <button type="button" class="btn btn-primary" id="testUploadBtn">
                            Test Upload
                        </button>
                        
                        <button type="button" class="btn btn-secondary" id="debugBtn">
                            Debug Info
                        </button>
                    </form>
                    
                    <div id="testResults" class="mt-4" style="display: none;">
                        <h6>Test Results:</h6>
                        <pre id="testOutput"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('testUploadBtn').addEventListener('click', function() {
    const form = document.getElementById('testUploadForm');
    const formData = new FormData(form);
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    
    console.log('Testing upload...');
    console.log('CSRF Token:', csrfToken);
    
    // Log form data
    for (let [key, value] of formData.entries()) {
        console.log(key, value);
    }
    
    fetch('/employees/{{ employee.emp_id }}/documents/ajax-upload/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': csrfToken
        }
    })
    .then(response => {
        console.log('Response status:', response.status);
        return response.json();
    })
    .then(data => {
        console.log('Response data:', data);
        document.getElementById('testResults').style.display = 'block';
        document.getElementById('testOutput').textContent = JSON.stringify(data, null, 2);
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById('testResults').style.display = 'block';
        document.getElementById('testOutput').textContent = 'Error: ' + error.message;
    });
});

document.getElementById('debugBtn').addEventListener('click', function() {
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    
    fetch('/employees/{{ employee.emp_id }}/test-upload/', {
        method: 'GET',
        headers: {
            'X-CSRFToken': csrfToken
        }
    })
    .then(response => response.json())
    .then(data => {
        console.log('Debug data:', data);
        document.getElementById('testResults').style.display = 'block';
        document.getElementById('testOutput').textContent = JSON.stringify(data, null, 2);
    })
    .catch(error => {
        console.error('Debug error:', error);
        document.getElementById('testResults').style.display = 'block';
        document.getElementById('testOutput').textContent = 'Debug Error: ' + error.message;
    });
});
</script>
{% endblock %}
